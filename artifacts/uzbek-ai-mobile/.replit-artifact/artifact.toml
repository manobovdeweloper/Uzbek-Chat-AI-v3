kind = "mobile"
previewPath = "/mobile/"
title = "O'zbek AI Mobile"
version = "1.0.0"
id = "artifacts/uzbek-ai-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 19456

[services.development]
run = "pnpm --filter @workspace/uzbek-ai-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uzbek-ai-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/uzbek-ai-mobile", "run", "serve" ]

[services.env]
PORT = "19456"
BASE_PATH = "/mobile/"
