kind = "web"
previewPath = "/"
title = "Uzbek AI Chat"
version = "1.0.0"
id = "artifacts/uzbek-ai-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21045

[services.development]
run = "pnpm --filter @workspace/uzbek-ai-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uzbek-ai-chat", "run", "build" ]
publicDir = "artifacts/uzbek-ai-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21045"
BASE_PATH = "/"
