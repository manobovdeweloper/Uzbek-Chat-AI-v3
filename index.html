<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Chat | Manopov</title>
    <link rel="stylesheet" href="mine.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="blob"></div>

    <section id="login-section">
        <div class="glass-card login-card">
            <h2>Xush kelibsiz</h2>
            <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Ismingizni yozing..." required>
            </div>
            <button class="main-btn" onclick="enterChat()">Kirish</button>
        </div>
    </section>

    <section id="chat-section" class="hidden">
        <div class="glass-card chat-container">
            <div class="sidebar">
                <div class="user-info">
                    <div class="avatar" id="avatar-circle">US</div>
                    <h3 id="display-name">User</h3>
                </div>
                <div class="contacts">
                    <div class="contact active">
                        <i class="fas fa-users"></i> Umumiy guruh
                    </div>
                </div>
            </div>

            <div class="chat-area">
                <div class="chat-header">
                    <span>Umumiy guruh</span>
                    <button class="exit-btn" onclick="location.reload()"><i class="fas fa-power-off"></i></button>
                </div>
                
                <div class="messages-container" id="chat-box">
                    <div class="message bot">
                        Salom! Men aqlli botman. Savollaringiz bo'lsa yozing. 😊
                    </div>
                </div>

                <div id="typing-status" class="typing hidden">Bot yozmoqda...</div>

                <div class="input-area">
                    <input type="text" id="msg-input" placeholder="Xabar yozing..." autocomplete="off">
                    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
